name: GitHub Trending AI 中文周报

on:
  schedule:
    # 每周一北京时间 10:00（UTC 02:00）
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      limit:
        description: "入选项目数量"
        required: false
        default: "8"
        type: string
      send_feishu:
        description: "是否发送飞书"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-trending-report
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 随机延迟
        run: sleep $((RANDOM % 60))

      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建必要目录
        run: |
          mkdir -p site reports logs data

      - name: 生成 GitHub Trending AI 周报
        env:
          REPORT_LIMIT: ${{ github.event.inputs.limit || vars.REPORT_LIMIT || '8' }}
          LOG_LEVEL: INFO
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL || 'gpt-4.1-mini' }}
        run: |
          echo "=========================================="
          echo "GitHub Trending AI 中文周报"
          echo "=========================================="
          echo "时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "入选项目数量: $REPORT_LIMIT"
          echo "数据来源: https://github.com/trending?since=weekly"
          echo "OpenAI: $([ -n "$OPENAI_API_KEY" ] && echo '已配置' || echo '未配置，将使用本地兜底文案')"
          echo "模型: ${OPENAI_MODEL:-gpt-4.1-mini}"
          echo "=========================================="
          python main.py --output-dir site --summary-file site/report-summary.json --limit "$REPORT_LIMIT" --history-file data/report-history.json --history-window 4
          cp site/report-summary.json reports/report-summary.json

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传 Pages 构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: 发布到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 发送飞书消息
        if: ${{ github.event.inputs.send_feishu != 'false' }}
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          FEISHU_BOT_WEBHOOK: ${{ secrets.FEISHU_BOT_WEBHOOK }}
          LARK_BOT_WEBHOOK: ${{ secrets.LARK_BOT_WEBHOOK }}
        run: |
          echo "=========================================="
          echo "通知配置检查"
          echo "=========================================="
          echo "飞书: $(([ -n "$FEISHU_WEBHOOK_URL" ] || [ -n "$FEISHU_BOT_WEBHOOK" ] || [ -n "$LARK_BOT_WEBHOOK" ]) && echo '已配置' || echo '未配置')"
          python main.py --send-only --require-webhook --summary-file site/report-summary.json --public-url "${{ steps.deployment.outputs.page_url }}"

      - name: 保存跨周去重历史
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/report-history.json
          git diff --cached --quiet || git commit -m "Update trending report history [skip ci]"
          git push

      - name: 上传运行产物
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: trending-report-${{ github.run_number }}
          path: |
            reports/
            logs/
            site/report-summary.json
          retention-days: 30

      - name: 显示运行结果
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "周报完成"
          echo "=========================================="
          echo "公开页面: ${{ steps.deployment.outputs.page_url }}"
          if [ -d "site" ]; then
            echo "生成文件:"
            ls -la site/
          fi
